<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator (Grid Layout)</title>
<style>
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    background-color: #2b3e50;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  
  .calculator {
    width: 340px;
    background-color: #1c1c1c;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
  }

 
  .display {
    width: 100%;
    height: 80px;
    background-color: #1c1c1c;
    color: white;
    font-size: 42px;
    text-align: right;
    display: flex;
    justify-content: flex-end;
    align-items: flex-end;
    padding: 10px;
    margin-bottom: 20px;
    word-break: break-all;
    font-weight: 300;
  }

  
  .buttons-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

 
  button {
    height: 65px;
    border-radius: 50%; 
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    transition: background-color 0.2s;
  }

  
  .btn-number {
    background-color: #333333;
    color: white;
  }
  .btn-number:hover { background-color: #444444; }

  
  .btn-special {
    background-color: #a5a5a5;
    color: black;
  }
  .btn-special:hover { background-color: #d2d2d2; }

  
  .btn-operator {
    background-color: #ff9f0a;
    color: white;
  }
  .btn-operator:hover { background-color: #f1a93b; }

  
  .btn-zero {
    grid-column: span 2;
    border-radius: 35px; 
    text-align: left;
    padding-left: 28px;
  }
</style>
</head>
<body>

  <div class="calculator">
  
    <div class="display">1,250</div>
    
    
    <div class="buttons-grid">
      <button class="btn-special">AC</button>
      <button class="btn-special">+/-</button>
      <button class="btn-special">%</button>
      <button class="btn-operator">÷</button>
      
      <button class="btn-number">7</button>
      <button class="btn-number">8</button>
      <button class="btn-number">9</button>
      <button class="btn-operator">×</button>
      
      <button class="btn-number">4</button>
      <button class="btn-number">5</button>
      <button class="btn-number">6</button>
      <button class="btn-operator">−</button>
      
      <button class="btn-number">1</button>
      <button class="btn-number">2</button>
      <button class="btn-number">3</button>
      <button class="btn-operator">+</button>
      
      
      <button class="btn-number btn-zero">0</button>
      <button class="btn-number">.</button>
      <button class="btn-operator">=</button>
    </div>
  </div>

</body>
</html>
